# -------------------------------------------------------------------------------
# SonarCloud Project Configuration
#
# Author: Alex Freidah
#
# Declares the SonarCloud project key and organisation, the coverage report
# path, and the directories the analyser must skip. Test files are analysed as
# tests (not main sources) so their inherently repetitive mock-server and
# assertion setup is not counted as source duplication or complexity.
# -------------------------------------------------------------------------------

sonar.projectKey=afreidah_cloudflare-log-collector
sonar.organization=afreidah

# Coverage report generated by `go test -coverprofile`
sonar.go.coverage.reportPaths=coverage.out

# Source directories. Test files, the Hugo site, docs, and packaging are not
# main sources and are excluded to avoid noisy duplication/complexity findings.
sonar.sources=.
sonar.exclusions=**/*_test.go,web/**,docs/**,packaging/**,**/*.md

# Test directories
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage exclusions (not counted toward coverage metrics): process entry
# points, metric definitions, OTel wiring, and thin lifecycle glue.
sonar.coverage.exclusions=cmd/**,internal/metrics/**,internal/telemetry/**,internal/lifecycle/**

sonar.sourceEncoding=UTF-8

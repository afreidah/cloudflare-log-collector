# -------------------------------------------------------------------------------
# Release Please Workflow - Automated Release Management
#
# Author: Alex Freidah
#
# Maintains a release PR that tracks all conventional-commit changes since the
# last release. Merging the release PR bumps the version, regenerates
# CHANGELOG.md, creates the GitHub Release and tag, then runs GoReleaser to
# build binaries and .deb packages.
#
# Docker images are published separately via `make push`.
# -------------------------------------------------------------------------------

name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          # PAT so the release PR triggers CI workflows (GITHUB_TOKEN would not).
          token: ${{ secrets.RELEASE_PAT }}

  preflight:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        run: make lint

      - name: Unit tests
        run: go test -race ./...

  release:
    runs-on: ubuntu-latest
    needs: [release-please, preflight]
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prep Debian changelog
        run: make prep-changelog

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

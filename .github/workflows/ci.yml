# -------------------------------------------------------------------------------
# CI Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Runs on push to main and pull requests. A path-detection job determines which
# file categories changed and downstream jobs use those outputs to skip
# irrelevant work. Lints, tests, and vulnerability-checks the Go code, then
# publishes coverage and the quality gate to SonarCloud. Versioning and releases
# are handled by release-please; Docker images are published via `make push`.
# Permissions are declared per job (least privilege) rather than workflow-wide;
# third-party actions are pinned to a full commit SHA.
# -------------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # PATH DETECTION
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'

  # ---------------------------------------------------------------------------
  # GO CHECKS
  # ---------------------------------------------------------------------------
  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.10.1

  test:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  govulncheck:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      # govulncheck is tracked as a tool dependency in go.mod, so its version is
      # locked in go.sum (verified, lock-file enforced) and run via `go tool`.
      # TEMP: 1.26.4 (stdlib CVE fix) is newer than setup-go's downloader; force
      # Go's toolchain download. Remove once `go-version: 1.26` resolves to 1.26.4+.
      - name: Run govulncheck
        run: go tool govulncheck ./...
        env:
          GOTOOLCHAIN: go1.26.4

  # ---------------------------------------------------------------------------
  # SONARQUBE ANALYSIS (coverage + quality gate -> SonarCloud)
  #
  # Runs unconditionally (not gated on Go changes) and generates its own
  # coverage, so non-Go fixes - Dockerfile, this workflow, sonar-project.properties
  # - get re-analyzed and their findings clear instead of lingering as stale.
  # ---------------------------------------------------------------------------
  sonarqube:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so SonarCloud can attribute new code

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
